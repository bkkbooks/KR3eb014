front:
  text: 序李時珍曰宋有俗子杜撰脈訣鄙陋紕繆醫學習誦以為權輿逮臻頒白脈理竟昧戴同父常刊其誤先考月池翁著四診發明八卷皆精詣奧室淺學未能窺造珍因撮粹擷華僭撰此書以便習讀為脈指南世之醫病兩家咸以脈為首務不知脈乃四診之末謂之巧者爾上士欲會其全非備四診不可明嘉靖甲子上元日謹書於瀕湖薖所
  hash: sha256:d6cc3adc683c9ed9d1e5f3d7c19b82d3331c09c75957966d23cb8c3abc768070
