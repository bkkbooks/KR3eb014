body:
  text: 浮陽浮脈舉之有餘按之不足脈經如微風吹鳥背上毛厭厭聶聶輕泛貌如循榆莢素問如水漂木崔氏如捻蔥葉黎氏浮脈法天有輕清在上之象在卦為乾在時為秋在人為肺又謂之毛太過則中堅旁虛如循雞羽病在外也不及則氣來毛微病在中也脈訣言尋之如太過乃浮兼洪緊之象非浮脈也體狀詩浮脈惟從肉上行如循榆莢似毛輕三秋得令知無恙久病逢之卻可驚相類詩浮如木在水中浮浮大中空乃是芤拍拍而浮是洪脈來時雖盛去悠悠浮脈輕平似捻蔥虛來遲大豁然空浮而柔細方為濡散似楊花無定蹤浮而有力為洪浮而遲大為虛虛甚為散浮而無力為芤浮而柔細為濡主病詩浮脈為陽表病居遲風數熱緊寒拘浮而有力多風熱無力而浮是血虛寸浮頭痛眩生風或有風痰聚在胸關上土衰兼木旺尺中溲便不流通浮脈主表有力表實無力表虛浮遲中風浮數風熱浮緊風寒浮緩風濕浮虛傷暑浮芤失血浮洪虛熱浮散勞極沉陰沉脈重手按至筋骨乃得脈經如綿裹砂內剛外柔楊氏如石投水必極其底沉脈法地有淵泉在下之象在卦為坎在時為冬在人為腎又謂之石亦曰營太過則如彈石按之益堅病在外也不及則氣來虛微去如數者病在中也脈訣言緩度三關狀如爛綿者非也沉有緩數及各部之沉爛綿乃弱脈非沉也體狀詩水行潤下脈來沉筋骨之間軟滑勻女子寸兮男子尺四時如此號為平相類詩沉幫筋骨自調勻伏則推筋著骨尋沉細如綿真弱脈弦長實大是牢形沉行筋間伏行骨上牢大有力弱細無力主病詩沉潛水蓄陰經病數熱遲寒滑有痰無力而沉虛與氣沉而有氣積並寒寸沉痰鬱水停胸關主中寒痛不通尺部濁遺並泄痢腎虛腰及下元痌沉脈主裡有力裡實無力裡虛沉則為氣又主水蓄沉遲痼冷沉數內熱沉滑痰食沉澀氣鬱沉弱寒熱沉緩寒濕沉緊冷痛遲陰遲脈一息三至去來極慢脈經遲為陽不勝陰故脈來不及脈談言重手乃得是有沉無浮一息三至甚為易見而曰隱隱曰狀且難是澀脈矣其謬可知體狀詩遲來一息至惟三陽不勝陰氣血寒但把浮沉分表裡消陰須益火之原體狀詩脈來三至號為遲小快於遲作緩持遲細而難知是澀浮而遲大以虛推三至為遲有力為緩無力為澀有止為弦遲甚為敗浮大而軟為虛黎氏曰遲小而實緩大而慢遲為陰盛陽衰緩為衛盛營弱宜別之主病詩遲司臟病或多痰沉痼癥瘕仔細看有力而遲為冷痛遲而無力定虛寒寸遲必是上焦寒關主中寒痛不堪尺是腎虛腰腳重溲便不禁疝牽丸遲脈主臟有力冷痛無力虛寒浮遲表寒沉遲裡寒數陽數脈一息六至脈經脈流薄疾素問數為陰不勝陽故脈來太過焉浮沉遲數脈之綱領素問脈經皆為正脈脈訣立七表八里而遺數脈止歌於心臟其妄甚矣體狀詩數脈息間常六至陰微陽盛必狂煩浮沉表裡分虛實惟有兒童作吉看相類詩數比平人多一至緊來如數似彈繩數而時止名為促數見關中動脈形數而弦急為緊流利為滑數而有止為促數甚為極數見關中為動主病詩數脈為陽熱可知只將君相火來醫實宜涼瀉虛溫補肺病秋深卻畏之寸數咽喉口舌瘡吐紅咳嗽肺生瘍當關胃火併肝火尺屬滋陰降火湯數脈主腑有力實火無力虛火浮數表熱沉數里熱氣口數實肺癰數虛肺痿滑陽中陰滑脈往來前卻流利展轉替替然如珠之應指脈經漉漉如欲脫滑為陰氣有餘故脈來流利如水脈者血之府也血盛則脈滑故腎脈宜之氣盛則脈澀故肺脈宜之脈訣云按之即伏三關如珠不進不退是不分浮滑沉滑尺寸之滑也今正之體狀相類詩滑脈如珠替替然往來流利卻還前莫將滑數為同類數脈惟看至數間滑則如珠數則六至主病詩滑脈為陽元氣衰痰生百病食生災上為吐逆下蓄血女脈調時定有胎寸滑膈痰生嘔吐吞酸舌強或咳嗽當關宿食肝脾熱渴痢㿗淋看尺部滑主痰飲浮滑風痰沉滑食痰滑數痰火滑短宿食脈訣言關滑胃寒赤滑臍似水與脈經言關滑胃熱尺滑血蓄婦人經病之旨相反其謬如此澀陰澀脈細而遲往來難短且散或一止復來脈經參伍不調素問如輕刀刮竹脈訣如雨沾沙通真子如病蠶食葉澀為陽氣有餘氣盛則血少故脈來蹇滯而肺宜之脈訣言指下尋之似有舉之全無與脈經所云絶不相干體狀詩細遲短澀往來難散止依稀應指間如雨沾沙容易散病蠶食葉慢而艱相類詩參伍不調名曰澀輕刀刮竹短而難微似秒芒微軟甚浮沉不別有無間細遲短散時一止曰澀極細而軟重按若絶曰微浮而柔細曰濡沉而柔細曰弱主病詩澀緣血少或傷精反胃亡陽汗雨淋寒濕入營為血痹女人非孕即無經寸澀心虛痛對胸胃虛脅脹察關中尺為精血俱傷候腸結溲淋或下紅澀主血少精傷之病女人有孕為胎病無孕為敗血杜光庭云澀脈獨見尺中形同代為死脈虛陰虛脈遲大而軟按之無力隱指豁豁然空脈經崔紫虛云形大力薄其虛可知脈訣言尋之不足舉之有餘上言浮脈不見虛狀楊仁齋言狀似柳絮散漫而遲滑氏言散大而軟皆是散脈非虛也體狀相類詩舉之遲大按之松脈狀無涯類谷空莫把芤虛為一例芤來浮大似慈蔥虛脈浮大而遲按之無力芤脈浮大按之中空芤為脫血虛為血虛浮散二脈見浮脈主病詩脈虛身熱為傷暑自汗怔忡驚悸多發熱陰虛須早治養營益氣莫蹉跎血不榮心寸口虛關中腹脹食難舒骨蒸痿痹傷精血卻在神門兩部居經曰血虛脈虛曰氣來虛微為不及病在內曰久病脈虛者死實陽實脈浮沉皆得脈大而長微弦應指愊愊然脈經愊愊堅實貌脈訣言如繩應指來乃緊脈非實脈也體狀詩浮沉皆得大而長應指無虛愊愊強熱蘊三焦成壯火通腸發汗始安康相類詩實脈浮沉有力強緊如彈索轉無常須知牢脈幫筋骨實大微弦更帶長浮沉有力為實弦急彈人為緊沉而實大微弦而長為牢主病詩實脈為陽火鬱成發狂譫語吐頻頻或為陽毒或傷食大便不通或氣疼寸實應知面熱風咽疼舌強氣填胸當關脾熱中宮滿尺實腰腸痛不通經曰血實脈實曰脈實者水穀為病曰氣來實強是謂太過脈訣言尺實小便不禁與脈經尺實小腹痛小便難之説何反潔古不知其謬訣為虛寒藥用薑附愈誤矣長陽長脈不小不大迢迢自若朱氏如循長竿末梢為平如引繩如循長竿為病素問長有三部之長一部之長在時為春在人為肝心脈長神強氣壯腎脈長蒂固根深經曰長則氣治皆言平脈也體狀相類詩過於本位脈名長弦則非然但滿張弦脈與長爭較遠良工尺度自能量實牢弦緊皆兼長脈主病詩長脈迢迢大小勻反常為病似牽繩若非陽毒癲癇病即是陽明熱勢深長主有餘之病短陰短脈不及本位脈訣應指而回不能滿部脈經戴同父云短脈只見尺寸若關中見短上不通寸下不通尺是陰陽絶脈必死矣故關不診短黎居士云長短未有定體諸脈舉按之附過於本位者為長不及本位者為短長脈屬肝宜於春短脈屬肺宜於秋但診肝肺長短自見體狀相類詩兩頭縮縮名為短澀短遲遲細且難短澀而浮秋喜見三春為賊有邪干澀微動結皆兼短脈主病詩短脈惟於尺寸尋短而滑數酒傷神浮為血澀沉為痞寸主頭疼尺腹疼經曰短則氣病短主不及之病洪陽洪脈指下極大脈經來盛去衰素問來大去長通真子洪脈在卦為離在時為夏在人為心素問謂之大亦曰鉤滑氏曰來盛去衰如鉤之曲上而復下應血脈來去之象象萬物敷布下垂之狀詹炎舉言如環珠者非脈訣云季夏宜之秋季冬季發汗通腸俱非洪脈所宜蓋謬也體狀詩脈來洪盛去還衰滿指淹淹應夏時若在春秋冬月分升陽散火莫狐疑相類詩洪脈來時拍拍然去衰來盛似波瀾欲知實脈參差處舉按弦長愊愊堅洪而有力為實實而無力為洪主病詩脈洪陽盛血應虛相火炎炎熱病居脹滿胃翻須早治陰虛泄痢可愁如寸洪心火上焦炎肺脈洪時金不堪肝火胃虛肝內察腎虛陰火尺中看洪主陽盛陰虛之病泄痢失血久嗽者忌之經曰形瘦脈大多氣者死曰脈大則病進微陰微脈極細而軟按之如欲絶若有若無脈經細而稍長戴氏素問謂之小氣血微則脈微體狀相類詩微脈輕微瞥瞥乎按之欲絶有如無微為陽弱細陰弱細比於微略較粗輕診即見重按如欲絶者微也往來如線而常有者細也仲景曰脈瞥瞥如羹上肥者陽氣微縈縈如蠶絲細者陰氣衰長病得之死卒病得之生主病詩氣血微兮脈亦微惡寒發熱汗淋漓男為勞極諸虛候女作崩中帶下醫寸微氣促或心驚關脈微時脹滿形尺部見之精血弱惡寒消疸痛呻吟微主久虛血弱之病陽微惡寒陰微發熱脈訣云歲中日久為白帶漏下多時骨亦枯緊陽緊脈來往有力左右彈人手素問如轉索無常仲景數如切繩脈經如紉箄線丹溪緊乃熱為寒束之脈故急數如此要有神氣素問謂之急脈訣言寥寥入尺來崔氏言如線皆非緊狀或以浮緊為弦沉緊為牢亦近似耳體狀詩舉如轉索切如繩脈象因之得緊名總是寒邪來作寇內為腹痛外身疼相類詩見弦實主病詩緊為諸痛主於寒喘咳風癇吐冷痰浮緊表寒鬚髮越緊沉溫散自然安寸緊人迎氣口分當關心腹痛沉沉尺中有緊為陰冷定是奔豚與疝疼諸緊為寒為痛人迎緊盛傷於寒氣口緊盛傷於食尺緊痛居其腹況乃疾在其腹中惡浮緊咳嗽沉緊皆主死緩陰緩脈去來小快於遲脈經一息四至戴氏如絲在經不卷其軸應指和緩往來甚勻張太素如初春楊柳舞風之象楊玄操如微風輕颭柳梢滑伯仁緩脈在卦為坤在時為四季在人為脾陽寸陰尺上下同等浮大而軟無有偏勝者平脈也若非其時即為有病緩而和勻不浮不沉不疾不徐不微不弱者即為胃氣故杜光庭云欲知死期何以取古賢推定五般土陽土須知不遇陰陰土遇陰當細數詳玉函經體狀詩緩脈阿阿四至通柳梢嫋嫋颭輕風欲從脈里求神氣只在從容和緩中相類詩見遲脈主病詩緩脈營衰衛有餘或風或濕或脾虛上為項強下痿痹分別浮沉大小區寸緩風邪項背拘關為風眩胃家虛神門濡泄或風祕或是蹣跚足力迂浮緩為風沉緩為濕緩大風虛緩細濕痹緩澀脾虛緩弱氣虛脈訣言緩主脾熱口臭反胃齒痛夢鬼之病出自杜撰與緩無關芤陽中陰芤脈浮大而軟按之中央空兩邊實脈經中空外實狀如慈蔥芤慈蔥也素問無芤名劉三點云芤脈何似絶類慈蔥指下成窟有邊無中戴同父云營行脈中脈以血為形芤脈中空脫血之象也脈經云三部脈芤長病得之生卒病得之死脈訣言兩頭有中間無是脈斷截矣又言主淋瀝氣入小腸與失血之候相反誤世不小體狀詩芤形浮大軟如蔥按之旁有中央空火犯陽經血上溢熱侵陰絡下流紅相類詩中空旁實乃為芤浮大而遲虛脈呼芤更帶弦名曰革血亡芤革血虛虛主病詩寸芤積血在於胸關內逢芤腸胃癰尺部見之多下血赤淋紅痢漏崩中弦陽中陰弦脈端直以長素問如張弓弦脈經按之不移綽綽如按琴瑟弦巢氏狀若箏弦脈訣從中直過挺然指下刊誤弦脈在卦為震在時為春在人為肝輕虛以滑者平實滑如循長竿者病徑急如新張弓弦者死池氏曰弦緊而數徑為太過弦緊而細為不及戴同父曰弦而軟其病輕弦而硬其病重脈訣言時時帶數又言脈緊狀繩牽皆非弦象今削之體狀詩弦脈迢迢端直長肝經木旺土應傷怒氣滿胸常欲叫翳蒙瞳子淚淋浪相類詩弦來端直似絲絃緊則如繩左右彈緊言其力弦言象牢脈弦長沉伏間又見長脈主病詩弦應東方肝膽經飲痰寒熱瘧纏身浮沉遲數須分別大小單雙有重輕寸弦頭痛膈多痰寒熱癥瘕察左關關右胃寒心腹痛尺中陰疝腳拘攣弦為木盛之病浮弦支飲外溢沉弦懸飲內痛瘧脈自弦弦數多熱弦遲多寒弦大主虛弦細拘急陽弦頭痛陰弦腹痛單絃飲癖雙弦寒痼若不食者木來剋土必難治革陰革脈弦而芤仲景如按鼓皮丹溪仲景曰弦則為寒芤則為虛虛寒相摶此名曰革男子亡血失精婦人半産漏下脈經曰三部脈革長病得之死卒病得之生時珍曰此即芤弦二脈相合故均主失血之候諸家脈書皆以為牢脈故或有革無牢有牢無革混淆不辨不知革浮牢沉革虛牢實形證皆異也又按甲乙經曰渾渾革革至如湧泉病進而危弊弊綽綽其去如弦絶者死謂脈來渾濁革變急如湧泉出而不反也王貺以為溢脈與此不同體狀主病詩革脈形如按鼓皮芤弦相合脈寒虛女人半産並崩漏男子營虛或夢遺相類詩見芤牢牢陰中陽牢脈似沉似伏實大而長微弦脈經扁鵲曰牢而長者肝也仲景曰寒則牢堅有牢固之象沈氏曰似沉似伏牢之位也實大弦長牢之體也脈訣不言形狀但云尋之則無按之則有云脈入皮膚辨息難又以牢為死脈皆孟浪謬誤體狀相類詩弦長實大脈牢堅牢位常居沉伏間革脈芤弦自浮起革虛牢實要詳看主病詩寒則牢堅里有餘腹心寒痛木乘脾疝㿗癥瘕何愁也失血陰虛卻忌之牢主寒實之病木實則為痛扁鵲云軟為虛牢為實失血者脈宜沉細反浮大而牢者死虛病見實脈也脈訣言骨間疼痛氣居於表池氏以為腎傳於脾皆謬妄不經濡陰即軟字濡脈極軟而浮細如帛在水中輕手相得按之無有脈經如水上浮漚帛浮水中重手按之隨手而及之象脈訣言按之似有舉還無是微脈非濡也體狀詩濡形浮細按須輕水面浮綿力不禁病後産中猶有藥平人若見是無根相類詩浮而柔細知為濡沉細諸柔作弱持微則浮微如欲絶細來沉細近於微浮細如綿曰濡沉細如綿曰弱浮而極細如絶曰微沉而極細不斷曰細主病詩濡為亡血陰虛病髓海丹田暗已虧汗雨夜來蒸入骨血山崩倒濕侵脾寸濡陽微自汗多關中其奈氣虛何尺傷精血虛寒甚溫補真陰可起疴濡主血虛之病又為傷濕弱陰弱脈極軟而沉細按之乃得舉手無有脈經弱乃濡之乾者脈訣言輕手乃得黎氏譬如浮漚皆是濡脈非弱也素問曰脈弱以滑是有胃氣脈弱以澀是謂久病病後老弱見之順平人少年見之逆體狀詩弱來無力按之柔柔細而沉不見浮陽陷入陰精血弱白頭猶可少年愁相類詩見濡脈主病詩弱脈陰虛陽氣衰惡寒發熱骨筋痿多驚多汗精神減益氣調營急早醫寸弱陽虛病可知關為胃弱與脾衰欲求陽陷陰虛病須把神門兩部推弱主氣虛之病仲景曰陽陷入陰故惡寒發熱又云弱主筋沉主骨陽浮陰弱血虛筋急柳氏曰氣虛則脈弱寸弱陽虛尺弱陰虛關弱胃虛散陰散脈大而散有表無里脈經渙漫不收崔氏無統紀無拘束至數不齊或來多去少或去多來少渙散不收如楊花散漫之象柳氏戴同父曰心脈浮大而散肺脈短澀而散平脈也心脈軟散怔忡肺脈軟散汗出肝脈軟散溢飲脾脈軟散胻腫病脈也腎脈軟散諸病脈代散死脈也難經曰散脈獨見則危柳氏曰散為氣血俱虛根本脫離之脈産婦得之生孕婦得之墮體狀詩散似楊花散漫飛去來無定至難齊産為生兆胎為墮久病逢之不必醫相類詩散脈無拘散漫然濡來浮細水中綿浮而遲大為虛脈芤脈中空有兩邊主病詩左寸怔忡右寸汗溢飲左關應軟散右關軟散胻腫胕居兩尺魂應斷細陰細脈小於微而常有細直而軟若絲線之應指脈經素問謂之小王啓玄言如莠蓬狀其柔細也脈訣言往來極微是微反大於細矣與經指背體狀詩細來纍纍細如絲應指沉沉無絶期春夏少年俱不利秋冬老弱卻相宜相類詩見微濡主病詩細脈縈縈血氣衰諸虛勞損七情乖若非濕氣侵腰腎即是傷精汗泄來寸細應知嘔吐頻入關腹脹胃虛形尺逢定是丹田冷泄痢遺精號脫陰脈經曰細為血少氣衰有此證則順否則逆故吐衄得沉細者生憂勞過度者脈亦細伏陰伏脈重按著骨指下裁動脈經脈行筋下刊誤脈訣言尋之似有定息全無殊為舛謬體狀詩伏脈推筋著骨尋指間裁動隱然深傷寒欲汗陽將解厥逆臍疼證屬陰相類詩見沉脈主病詩伏為霍亂吐頻頻腹痛多緣宿食停蓄飲老痰成積聚散寒溫里莫因循食鬱胸中雙寸伏欲吐不吐常兀兀當關腹痛困沉沉關後疝疼還破腹傷寒一手脈伏曰單伏兩手脈伏曰雙伏不可以陽證見陰為診乃火邪內郁不得發越陽極似陰故脈伏必有大汗而解正如久旱將雨六合陰晦雨後庶物皆蘇之義又有夾陰傷寒先有伏陰在內外復感寒陰盛陽衰四脈厥逆六脈沉伏須投薑附及灸關元脈乃復出也若太溪衝陽皆無脈者必死脈訣言徐徐發汗潔古以附子細辛麻黃湯主之皆非也劉元賓曰伏脈不可發汗動陽動乃數脈見於關上下無頭尾如豆大厥厥動搖仲景曰陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒此三焦傷也成無己曰陰陽相搏則虛者動故陽虛則陽動陰虛則陰動龐安常曰關前三分為陽後三分為陰關位半陰半陽故動隨虛見脈訣言尋之似有舉之還無不離其處不往不來三關沉沉含糊謬妄殊非動脈詹氏言其形鼓動如鉤如毛者尤謬體狀詩動脈搖搖數在關無頭無尾豆形團其原本是陰陽搏虛者搖兮勝者安主病詩動脈專司痛與驚汗因陽動熱因陰或為泄痢拘攣病男子亡精女子崩仲景曰動則為痛為驚素問曰陰虛陽搏謂之崩又曰婦人手少陰脈動甚者妊子也促陽促脈來去數時一止復來脈經如蹶之趣徐疾不常黎氏脈經但言數而止為促脈訣乃云並居寸口不言時止者謬矣數止為促緩止為結何獨寸口哉體狀詩促脈數而時一止此為陽極欲亡陰三焦鬱火炎炎盛進必無生退可生相類詩見代脈主病詩促脈惟將火病醫其因有五細推之時時喘咳皆痰積或發狂斑與毒疽促主陽盛之病促結之因皆有氣血痰飲食五者之別一有留滯則脈必見止也結陰結脈往來緩時一止復來脈經脈訣言或來或去聚而卻還與結無關仲景有纍纍如循長竿曰陰結藹藹如車蓋曰陽結脈經又有如麻子動搖旋引旋收聚散不常者曰結主死此三脈名同實異也體狀詩結脈緩而時一止獨陰偏盛欲亡陽浮為氣滯沉為積汗下分明在主張相類詩見代脈主病詩結脈皆因氣血凝老痰結滯苦沉吟內生積聚外癰腫疝瘕假為殃病屬陰結主陰盛之病越人曰結甚則積甚結微則氣微浮結外有痛積伏結內有積聚代陰代脈動而中止不能自還因而復動仲景脈至還入尺良久方來吳氏脈一息五至肺心脾肝腎五臟之氣皆足五十動而一息合大衍之數謂之平脈反此則止乃見焉腎氣不能至則四十動一止肝氣不能至則三十動一止蓋一臟之氣衰而他臟之氣代至也經曰代則氣衰滑伯仁曰若無病羸瘦脈代者危脈也有病而氣血乍損氣不能續者只為病脈傷寒心悸脈代者復脈湯主之妊娠脈代者其胎百日代之生死不可不辨體狀詩動而中止不能還復動因而作代看病者得之猶可療平人卻與壽相關相類詩數而時至名為促緩止須將結脈呼止不能回方是代結生代死自殊塗促結之止無常數或二動三動一止即來代脈之止有常數必依數而止還入尺中良久方來也主病詩代脈元因臟氣衰腹痛泄痢下元虧或為吐瀉中宮病女子懷胎三月兮脈經曰代散者死生泄及便膿血五十不止身無病數內有止皆知定四十一止一臟絶四年之後多亡命三十一止即三年二十一止二年應十動一止一年殂更觀氣色兼形證兩動一止三四日三四動止應六七五六一止七八朝次第推之自無失戴同父曰脈必滿五十動出自難經而脈訣五臟歌皆以四十五動為準乖於經旨柳東陽曰古以動數候脈是吃緊語須候五十動乃知五臟缺失今人指到腕臂即云見了夫五十動豈彈指間事耶故學者當診脈問證聽聲觀色斯備四珍而無失四言舉要脈乃血派氣血之先血之隧道氣息應焉其象法地血之府也心之合也皮之部也資始於腎資生於胃陽中之陰本乎營衛營者陰血衛者陽氣營行脈中衛行脈外脈不自行隨氣而至氣動脈應陰陽之誼氣如橐籥血如波瀾血脈氣息上下循環十二經中皆有動脈惟手太陰寸口取決此經屬肺上系吭嗌脈之大會息之出入一呼一吸四至為息日夜一萬三千五百一呼一吸脈行六寸日夜八百十丈為準初持脈時令仰其掌掌後高骨是謂關上關前為陽關後為陰陽寸陰尺先後推尋心肝居左肺脾居右腎與命門居兩尺部魂魄穀神皆見寸口左主司官右主司府左大順男右大順女本命扶命男左女右關前一分人命之主左為人迎右為氣口神門決斷兩在關後人無二脈病死不愈男女脈同惟尺則異陽弱陰盛反此病至脈有七診曰浮中沉上下左右消息求尋又有九候舉按輕重三部浮沉各候五動寸候胸上關候膈下尺候於臍下至跟踝左脈候左右脈候右病隨所在不病者否浮為心肺沉為腎肝脾胃中州浮沉之間心脈之浮浮大而散肺脈之浮浮澀而短肝脈之沉沉而弦長腎脈之沉沉實而濡脾胃屬土脈宜和緩命為相火左寸同斷春弦夏洪秋毛冬石四季和緩是謂平脈太過實強病生於外不及虛微病生於內春得秋脈死在金日五臟準此推之不失四時百病胃氣為本脈貴有神不可不審調停自氣呼吸定息四至五至平和之則三至為遲遲則為冷六至為數數即熱證轉遲轉冷轉數轉熱遲數既明浮沉當別浮沉遲數辨內外因外因於天內因於人天有陰陽風雨晦冥人喜怒憂思悲恐驚外因之浮則為表證沉里遲陰數則陽盛內因之浮虛風所為沉氣遲冷數熱何疑浮數表熱沉數里熱浮遲表虛沉遲冷結表裡陰陽風氣冷熱辨內外因脈證參別脈理浩繁總括於四既得提綱引申觸類浮脈法天輕手可得泛泛在上如水漂木有力洪大來盛去悠無力虛大遲而且柔虛甚則散渙漫不收有邊無中其名曰芤浮小為濡綿浮水面濡甚則微不任尋按沉脈法地近於筋骨深深在下沉極為伏有力為牢實大弦長牢甚則實愊愊而強無力為弱柔小如綿弱甚則細如蛛絲然遲脈屬陰一息三至小快於遲緩不及四二損一敗病不可治兩息奪精脈已無氣浮大虛散或見芤革浮小濡微沉小細弱遲細為澀往來極難易散一止止而復還結則來緩止而復來代則來緩止不能回數脈屬陽六至一息七疾八極九至為脫浮大者洪沉大牢實往來流利是謂之滑有力為緊彈如轉索數見寸口有止為促數見關中動脈可候厥厥動搖狀如小豆長則氣治過於本位長而端直弦脈應指短則氣病不能滿部不見於關惟尺寸候一脈一形各有主病數脈相兼則見諸證浮脈主表里必不足有力風熱無力血弱浮遲風虛浮數風熱浮緊風寒浮緩風濕浮虛傷暑浮芤失血浮洪虛火浮微勞極浮濡陰虛浮散虛劇浮弦痰飲浮滑痰熱沉脈主裡主寒主積有力痰食無力氣鬱沉遲虛寒沉數熱伏沉緊冷痛沉緩水蓄沉牢痼冷沉實熱極沉弱陰虛沉細痹濕沉弦飲痛沉滑宿食沉伏吐利陰毒聚積遲脈主臟陽氣伏潛有力為痛無力虛寒數脈主腑主吐主狂有力為熱無力為瘡滑脈主痰或傷於食下為蓄血上為吐逆澀脈少血或中寒濕反胃結腸自汗厥逆弦脈主飲病屬膽肝弦數多熱弦遲多寒浮弦支飲沉弦懸痛陽弦頭痛陰弦腹痛緊脈主寒又主諸痛浮緊表寒沉緊里痛長脈氣平短脈氣病細則氣少大則病進浮長風癇沉短宿食血虛脈虛氣實脈實洪脈為熱其陰則虛細脈為濕其血則虛緩大者風緩細者濕緩澀血少緩滑內熱濡小陰虛弱小陽竭陽竭惡寒陰虛發熱陽微惡寒陰微發熱男微虛損女微瀉血陽動汗出陰動發熱為痛與驚崩中失血虛寒相搏其名為革男子失精女子失血陽盛則促肺癰陽毒陰盛則結疝瘕積鬱代則氣衰或泄膿血傷寒心悸女胎三月脈之主病有宜不宜陰陽順逆凶吉可推中風浮緩急實則忌浮滑中痰沉遲中氣尸厥沉滑卒不知人入臟身冷入腑身溫風傷於衛浮緩有汗寒傷於營浮緊無汗暑傷於氣脈虛身熱濕傷於血脈緩細澀傷寒熱病脈喜浮洪沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽病見陰病必危殆陰病見陽雖困無害上不至關陰氣已絶下不至關陽氣已竭代脈止歇臟絶傾危散脈無根形損難醫飲食內傷氣口急滑勞倦內傷脾脈大弱欲知是氣下手脈沉沉極則伏澀弱久深火鬱多沉滑痰緊食氣澀血芤數火細濕滑主多痰弦主留飲熱則滑數寒則弦緊浮滑兼風沉滑兼氣食傷短疾濕留濡細瘧脈自弦弦數者熱弦遲者寒代散者折泄瀉下痢沉小滑弱實大浮洪發熱則惡嘔吐反胃浮滑者昌弦數緊澀結腸者亡霍亂之候脈代勿訝厥逆遲微是則可怕咳嗽多浮聚肺關胃沉緊小危浮濡易治喘急息肩浮滑者順沉澀肢寒散脈逆證病熱有火洪數可醫沉微無火無根者危骨蒸發熱脈數而虛熱而澀小必殞其軀勞極諸虛浮軟微弱土敗雙弦火炎急數諸病失血脈必見芤緩小可喜數大可憂瘀血內蓄卻宜牢大沉小澀微反成其害遺精白濁微澀而弱火盛陰虛芤濡洪數三消之脈浮大者生細小微澀形脫可驚小便淋閟鼻頭色黃澀小無血數大何妨大便燥結須分氣血陽數而實陰遲而澀癲乃重陰狂乃重陽浮洪吉兆沉急凶殃癇脈宜虛實急者惡浮陽沉陰滑痰數熱喉痹之脈數熱遲寒纏喉走馬微伏則難諸風眩暈有火有痰左澀死血右大虛看頭痛多弦浮風緊寒熱洪濕細緩滑厥痰氣虛弦軟血虛微澀腎厥弦堅真痛短澀心腹之痛其類有九細遲從吉浮大延久疝氣弦急積聚在裡牢急者生弱急者死腰痛之脈多沉而弦兼浮者風兼緊者寒弦滑痰飲濡細腎著大乃腎虛沉實閃肭腳氣有四遲寒數熱浮滑者風濡細者濕痿病肺虛脈多微緩或澀或緊或細或濡風寒濕氣合而為痹浮澀而緊三脈乃備五疸實熱脈必洪數澀微屬虛切忌發渴脈得諸沉責其有水浮氣與風沉石或里沉數為陽沉遲為陰浮大出厄虛小可驚脹滿脈弦土製於木濕熱數洪陰寒遲熱浮為虛滿緊則中實浮大可治虛小危極五臟為積六腑為聚實強者生沉細者死中惡腹脹緊細者生脈若浮大邪氣已深癰疽浮散惡寒發熱若有痛處癰疽所發脈數發熱而痛者陽不數不熱不疼陰瘡未潰癰疽不怕洪大已潰癰疽洪大可怕肺癰已成寸數而實肺痿之形數而無力肺癰色白脈宜短澀不宜浮大唾糊嘔血腸癰實熱滑數可知數而不熱關脈芤虛微澀而緊未膿當下緊數膿成切不可下婦人之脈以血為本血旺易胎氣旺難孕少陰動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如釜欲産之脈其至離經水下乃産未下勿驚新産之脈緩滑為吉實大弦牢有證則逆小兒之脈七至為平更察色證與虎口紋奇經八脈其診又別直上直下浮則為督牢則為沖緊則任脈寸左右彈陽蹺可決尺左右彈陰蹺可別關左右彈帶脈當訣尺外斜上至寸陰維尺內斜上至寸陽維督脈為病脊強癲癇任脈為病七疝瘕堅衝脈為病逆氣裡急帶主帶下臍痛精失陽維寒熱目眩僵仆陰維心痛胸脅刺築陽蹺為病陽緩陰急陰蹺為病陰緩陽急癲癇瘛瘲寒熱恍惚八脈脈證各有所屬平人無脈移於外絡兄位弟乘陽溪列缺病脈既明吉凶當別經脈之外又有真脈肝絶之脈循刀責責心絶之脈轉豆躁疾脾則雀啄如屋之漏如水之流如杯之覆肺絶如毛無根蕭索麻子動搖浮波之合腎脈將絶至如省客來如彈石去如解索命脈將絶蝦遊魚翔至如湧泉絶在膀胱真脈既形胃已無氣參察色證斷之以臆
